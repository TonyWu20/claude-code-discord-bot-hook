<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#EFF1F5"/>

  <!-- Blue tilted band — upper-left zone -->
  <polygon points="0,0 800,0 800,80 0,300" fill="#1E66F5"/>

  <!-- Thread bars — right column, stacked, varying widths, tilted as a group -3° -->
  <g transform="rotate(-3, 680, 480)">
    <rect x="460" y="340" width="300" height="9" fill="#1E66F5"/>
    <rect x="490" y="362" width="240" height="7" fill="#CCD0DA"/>
    <rect x="490" y="379" width="180" height="7" fill="#CCD0DA"/>
    <rect x="490" y="396" width="210" height="7" fill="#CCD0DA"/>
    <rect x="460" y="418" width="300" height="9" fill="#1E66F5"/>
    <rect x="490" y="440" width="200" height="7" fill="#CCD0DA"/>
    <rect x="490" y="457" width="240" height="7" fill="#CCD0DA"/>
    <rect x="460" y="478" width="300" height="9" fill="#1E66F5"/>
    <rect x="490" y="500" width="160" height="7" fill="#CCD0DA"/>
    <rect x="490" y="517" width="220" height="7" fill="#CCD0DA"/>
  </g>

  <!-- Thread label block -->
  <g transform="rotate(-3, 540, 570)">
    <rect x="460" y="548" width="300" height="52" fill="#1E66F5"/>
    <text x="476" y="571" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#CCD0DA" letter-spacing="0.08em"># SESSION THREAD</text>
    <text x="476" y="589" font-family="'Inter',system-ui,sans-serif" font-size="13" font-weight="700" fill="#EFF1F5">session-name</text>
  </g>

  <!-- White text in blue band -->
  <text x="48" y="52" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#EFF1F5" opacity="0.75" letter-spacing="0.15em">07 / 09  ·  ORGANIZATION</text>

  <!-- Headline tilted -8°, left column -->
  <g transform="rotate(-8, 48, 360)">
    <text x="48" y="240" font-family="'Inter',system-ui,sans-serif" font-size="82" font-weight="900" fill="#4C4F69" letter-spacing="-0.028em">Thread</text>
    <text x="48" y="330" font-family="'Inter',system-ui,sans-serif" font-size="82" font-weight="900" fill="#1E66F5" letter-spacing="-0.028em">Organi-</text>
    <text x="48" y="420" font-family="'Inter',system-ui,sans-serif" font-size="82" font-weight="900" fill="#4C4F69" letter-spacing="-0.028em">zation.</text>
  </g>

  <!-- Tilted rule -->
  <line x1="48" y1="500" x2="440" y2="488" stroke="#CCD0DA" stroke-width="1.5"/>

  <!-- Body -->
  <text x="48" y="536" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">Each session gets its own Discord</text>
  <text x="48" y="560" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">thread, labeled via /rename.</text>
  <text x="48" y="584" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">Clean server, every time.</text>

  <!-- Footer -->
  <line x1="48" y1="738" x2="752" y2="748" stroke="#4C4F69" stroke-width="1"/>
  <text x="48" y="764" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.12em">CLAUDE CODE DISCORD BOT HOOK</text>
</svg>
