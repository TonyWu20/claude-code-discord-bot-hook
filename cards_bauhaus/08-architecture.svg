<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#EFF1F5"/>

  <!-- "ARCHITECTURE" rotated 90° as left-column geometry -->
  <g transform="rotate(-90, 88, 400)">
    <text x="-200" y="112" font-family="'Inter',system-ui,sans-serif" font-size="44" font-weight="900" fill="#CCD0DA" letter-spacing="0.14em">ARCHITECTURE</text>
  </g>

  <!-- Architecture flow — right column, compact, upright -->
  <!-- Node: Claude Code -->
  <rect x="220" y="60" width="240" height="56" fill="#4C4F69"/>
  <text x="340" y="85" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#EFF1F5" letter-spacing="0.07em" text-anchor="middle">CLAUDE CODE</text>
  <text x="340" y="103" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="400" fill="#CCD0DA" text-anchor="middle">hook event</text>

  <!-- Arrow down-left -->
  <line x1="290" y1="116" x2="250" y2="168" stroke="#4C4F69" stroke-width="1.5"/>
  <polygon points="244,163 256,163 250,176" fill="#4C4F69"/>

  <!-- Node: notify_discord.py -->
  <rect x="80" y="176" width="220" height="56" fill="#1E66F5"/>
  <text x="190" y="201" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#EFF1F5" text-anchor="middle">notify_discord.py</text>
  <text x="190" y="219" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="400" fill="#CCD0DA" text-anchor="middle">thin hook shim</text>

  <!-- Arrow down-right (dashed) notify → decisions -->
  <line x1="240" y1="232" x2="300" y2="290" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="293,290 305,285 302,298" fill="#1E66F5"/>

  <!-- Arrow down-right: Claude Code → discord_bot -->
  <line x1="400" y1="116" x2="460" y2="168" stroke="#4C4F69" stroke-width="1.5"/>
  <polygon points="454,163 466,163 460,176" fill="#4C4F69"/>

  <!-- Node: discord_bot.py -->
  <rect x="400" y="176" width="220" height="56" fill="#D20F39"/>
  <text x="510" y="201" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#EFF1F5" text-anchor="middle">discord_bot.py</text>
  <text x="510" y="219" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="400" fill="#CCD0DA" text-anchor="middle">persistent bot</text>

  <!-- Arrow down-left (dashed) decisions → discord_bot -->
  <line x1="380" y1="320" x2="460" y2="270" stroke="#D20F39" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="453,262 465,268 455,276" fill="#D20F39"/>

  <!-- Node: Decision Dir -->
  <rect x="200" y="296" width="280" height="56" fill="#CCD0DA"/>
  <text x="340" y="321" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#4C4F69" letter-spacing="0.05em" text-anchor="middle">DECISION DIR</text>
  <text x="340" y="339" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="400" fill="#6C6F85" text-anchor="middle">~/.claude/discord-decisions/</text>

  <!-- Arrow: discord_bot → Discord -->
  <line x1="480" y1="232" x2="440" y2="408" stroke="#8839EF" stroke-width="1.5"/>
  <polygon points="432,404 444,404 438,416" fill="#8839EF"/>

  <!-- Node: Discord -->
  <rect x="280" y="416" width="240" height="56" fill="#8839EF"/>
  <text x="400" y="441" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#EFF1F5" letter-spacing="0.08em" text-anchor="middle">DISCORD</text>
  <text x="400" y="459" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="400" fill="#CCD0DA" text-anchor="middle">channel / thread</text>

  <!-- Tilted rule separating diagram from text -->
  <line x1="80" y1="510" x2="720" y2="496" stroke="#CCD0DA" stroke-width="1.5"/>

  <!-- "Architecture." headline — tilted -4° -->
  <g transform="rotate(-4, 80, 575)">
    <text x="80" y="575" font-family="'Inter',system-ui,sans-serif" font-size="52" font-weight="900" fill="#4C4F69" letter-spacing="-0.02em">Architecture.</text>
  </g>

  <text x="80" y="624" font-family="'Inter',system-ui,sans-serif" font-size="16" font-weight="400" fill="#4C4F69">Thin shim per event. Persistent bot holds</text>
  <text x="80" y="646" font-family="'Inter',system-ui,sans-serif" font-size="16" font-weight="400" fill="#4C4F69">the connection. Decision files bridge them.</text>

  <!-- Label -->
  <text x="80" y="36" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.15em">08 / 09  ·  ARCHITECTURE</text>
  <line x1="80" y1="738" x2="720" y2="748" stroke="#4C4F69" stroke-width="1"/>
  <text x="80" y="764" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.12em">CLAUDE CODE DISCORD BOT HOOK</text>
</svg>
