<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#EFF1F5"/>

  <!-- Tilted teal band: upper-right quadrant -->
  <polygon points="800,0 800,500 480,800 800,800" fill="#179299" opacity="0.12"/>
  <polygon points="800,0 800,340 600,800 800,800" fill="#179299" opacity="0.15"/>
  <polygon points="800,0 800,180 740,800 800,800" fill="#179299"/>

  <!-- Teal solid circle — anchored top-right -->
  <circle cx="752" cy="80" r="56" fill="#EFF1F5"/>
  <circle cx="752" cy="80" r="28" fill="#179299"/>

  <!-- Headline tilted +8° — occupies left zone -->
  <g transform="rotate(8, 48, 340)">
    <text x="48" y="200" font-family="'Inter',system-ui,sans-serif" font-size="88" font-weight="900" fill="#4C4F69" letter-spacing="-0.03em">Monitor</text>
    <text x="48" y="296" font-family="'Inter',system-ui,sans-serif" font-size="88" font-weight="900" fill="#179299" letter-spacing="-0.03em">Sessions</text>
    <text x="48" y="392" font-family="'Inter',system-ui,sans-serif" font-size="88" font-weight="900" fill="#4C4F69" letter-spacing="-0.03em">Remotely.</text>
  </g>

  <!-- Tilted rule -->
  <line x1="48" y1="470" x2="520" y2="455" stroke="#CCD0DA" stroke-width="1.5"/>

  <!-- Body -->
  <text x="48" y="508" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">Approve or deny permission requests</text>
  <text x="48" y="532" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">from your phone while away from</text>
  <text x="48" y="556" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">your computer.</text>

  <!-- Callout block — tilted -->
  <g transform="rotate(-3, 48, 640)">
    <rect x="48" y="610" width="280" height="58" fill="#4C4F69"/>
    <text x="64" y="635" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#179299" letter-spacing="0.1em">TIMEOUT</text>
    <text x="64" y="657" font-family="'Inter',system-ui,sans-serif" font-size="20" font-weight="900" fill="#EFF1F5">120 seconds</text>
  </g>

  <!-- Label + footer -->
  <text x="48" y="56" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.15em">03 / 09  ·  REMOTE ACCESS</text>
  <line x1="48" y1="738" x2="752" y2="748" stroke="#4C4F69" stroke-width="1"/>
  <text x="48" y="764" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.12em">CLAUDE CODE DISCORD BOT HOOK</text>
</svg>
