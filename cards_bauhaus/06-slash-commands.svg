<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#EFF1F5"/>

  <!-- Giant tilted "/" — the geometry IS the shape, -18deg, fills card -->
  <g transform="rotate(-18, 400, 400)">
    <text x="120" y="640" font-family="'Inter',system-ui,sans-serif" font-size="700" font-weight="900" fill="#FE640B" opacity="0.12" letter-spacing="-0.1em">/</text>
  </g>

  <!-- Peach block — right column, upper, counterweight -->
  <polygon points="620,0 800,0 800,320 540,320" fill="#FE640B"/>

  <!-- White text in peach block -->
  <text x="636" y="80" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#EFF1F5" opacity="0.8" letter-spacing="0.1em">COMMAND</text>
  <text x="636" y="108" font-family="'Inter',system-ui,sans-serif" font-size="20" font-weight="900" fill="#EFF1F5">/sessions</text>
  <line x1="636" y1="124" x2="780" y2="124" stroke="#EFF1F5" stroke-width="1" opacity="0.4"/>
  <text x="636" y="152" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#EFF1F5" opacity="0.8" letter-spacing="0.1em">COMMAND</text>
  <text x="636" y="178" font-family="'Inter',system-ui,sans-serif" font-size="16" font-weight="900" fill="#EFF1F5">/history</text>
  <text x="636" y="202" font-family="'Inter',system-ui,sans-serif" font-size="13" font-weight="400" fill="#EFF1F5" opacity="0.8">[session] [tail]</text>
  <text x="636" y="260" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="400" fill="#EFF1F5" opacity="0.7">Inspect sessions</text>
  <text x="636" y="278" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="400" fill="#EFF1F5" opacity="0.7">from Discord.</text>

  <!-- Headline — tilted +5°, left column -->
  <g transform="rotate(5, 48, 260)">
    <text x="48" y="200" font-family="'Inter',system-ui,sans-serif" font-size="88" font-weight="900" fill="#4C4F69" letter-spacing="-0.03em">Slash</text>
    <text x="48" y="296" font-family="'Inter',system-ui,sans-serif" font-size="88" font-weight="900" fill="#FE640B" letter-spacing="-0.03em">Com-</text>
    <text x="48" y="392" font-family="'Inter',system-ui,sans-serif" font-size="88" font-weight="900" fill="#4C4F69" letter-spacing="-0.03em">mands.</text>
  </g>

  <!-- Tilted rule -->
  <line x1="48" y1="468" x2="560" y2="450" stroke="#CCD0DA" stroke-width="1.5"/>

  <!-- Body -->
  <text x="48" y="504" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">Inspect active sessions and conversation</text>
  <text x="48" y="528" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">history directly from Discord.</text>

  <!-- Label + footer -->
  <text x="48" y="56" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.15em">06 / 09  ·  COMMANDS</text>
  <line x1="48" y1="738" x2="752" y2="748" stroke="#4C4F69" stroke-width="1"/>
  <text x="48" y="764" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.12em">CLAUDE CODE DISCORD BOT HOOK</text>
</svg>
