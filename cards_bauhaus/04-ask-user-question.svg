<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#EFF1F5"/>

  <!-- Mauve tilted band — slashes upper-right corner -->
  <polygon points="400,0 800,0 800,360 160,800 0,800 0,640" fill="#8839EF" opacity="0.1"/>
  <polygon points="560,0 800,0 800,260 360,800 240,800" fill="#8839EF" opacity="0.12"/>
  <polygon points="720,0 800,0 800,120 560,800 480,800" fill="#8839EF"/>

  <!-- Mauve solid circle — upper-right -->
  <circle cx="660" cy="60" r="44" fill="#EFF1F5"/>

  <!-- Headline tilted -9° — anchored left -->
  <g transform="rotate(-9, 48, 300)">
    <text x="48" y="190" font-family="'Inter',system-ui,sans-serif" font-size="80" font-weight="900" fill="#4C4F69" letter-spacing="-0.025em">AskUser</text>
    <text x="48" y="278" font-family="'Inter',system-ui,sans-serif" font-size="80" font-weight="900" fill="#8839EF" letter-spacing="-0.025em">Question</text>
    <text x="48" y="366" font-family="'Inter',system-ui,sans-serif" font-size="80" font-weight="900" fill="#4C4F69" letter-spacing="-0.025em">Support.</text>
  </g>

  <!-- Tilted rule -->
  <line x1="48" y1="445" x2="540" y2="430" stroke="#CCD0DA" stroke-width="1.5"/>

  <!-- Body -->
  <text x="48" y="482" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">Multi-choice questions appear as</text>
  <text x="48" y="506" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">Discord Select menus. Free-text</text>
  <text x="48" y="530" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">answers open a Modal dialog.</text>

  <!-- Tags -->
  <rect x="48" y="566" width="200" height="36" fill="#8839EF"/>
  <text x="148" y="589" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#EFF1F5" letter-spacing="0.06em" text-anchor="middle">SELECT MENU</text>
  <rect x="264" y="566" width="180" height="36" fill="#4C4F69"/>
  <text x="354" y="589" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#EFF1F5" letter-spacing="0.06em" text-anchor="middle">TEXT MODAL</text>

  <!-- Accent bars — right-anchored, flush to bottom of card -->
  <rect x="48" y="634" width="500" height="8" fill="#8839EF"/>
  <rect x="48" y="652" width="380" height="8" fill="#CCD0DA"/>
  <rect x="48" y="670" width="440" height="8" fill="#CCD0DA"/>

  <!-- Label + footer -->
  <text x="48" y="56" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.15em">04 / 09  ·  INTERACTION</text>
  <line x1="48" y1="738" x2="752" y2="748" stroke="#4C4F69" stroke-width="1"/>
  <text x="48" y="764" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.12em">CLAUDE CODE DISCORD BOT HOOK</text>
</svg>
