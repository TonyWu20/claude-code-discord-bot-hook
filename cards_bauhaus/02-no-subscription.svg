<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#EFF1F5"/>

  <!-- Tilted dark band: sweeps bottom-left to top-right -->
  <polygon points="0,800 800,800 800,560 0,680" fill="#4C4F69"/>

  <!-- Yellow circle punched in bottom-right of dark band -->
  <circle cx="680" cy="710" r="100" fill="#DF8E1D"/>

  <!-- Giant $0 — tilted watermark, fills upper zone -->
  <g transform="rotate(-14, 300, 360)">
    <text x="20" y="480" font-family="'Inter',system-ui,sans-serif" font-size="340" font-weight="900" fill="#CCD0DA" opacity="0.55" letter-spacing="-0.06em">$0</text>
  </g>

  <!-- Headline — tilted, upper-left zone, on top of watermark -->
  <g transform="rotate(-7, 48, 220)">
    <text x="48" y="180" font-family="'Inter',system-ui,sans-serif" font-size="78" font-weight="900" fill="#4C4F69" letter-spacing="-0.025em">No Subscription</text>
    <text x="48" y="265" font-family="'Inter',system-ui,sans-serif" font-size="78" font-weight="900" fill="#DF8E1D" letter-spacing="-0.025em">Required.</text>
  </g>

  <!-- Tilted rule cutting mid-card -->
  <line x1="48" y1="430" x2="600" y2="410" stroke="#CCD0DA" stroke-width="1.5"/>

  <!-- Body — upright, mid zone -->
  <text x="48" y="468" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">Runs entirely on Claude Code's hook system.</text>
  <text x="48" y="494" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">All you need is a Discord bot token.</text>

  <!-- Tag — sits just above dark band -->
  <rect x="48" y="526" width="190" height="36" fill="#DF8E1D"/>
  <text x="143" y="549" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#EFF1F5" letter-spacing="0.08em" text-anchor="middle">FREE TO USE</text>

  <!-- White text in dark band -->
  <text x="48" y="620" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#EFF1F5" opacity="0.6" letter-spacing="0.15em">02 / 09  ·  ACCESSIBILITY</text>
  <text x="48" y="764" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.12em">CLAUDE CODE DISCORD BOT HOOK</text>
</svg>
