<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#EFF1F5"/>

  <!-- Green tilted band — sweeps from bottom-left to mid-right -->
  <polygon points="0,800 0,560 800,340 800,800" fill="#40A02B" opacity="0.13"/>
  <polygon points="0,800 0,660 800,460 800,800" fill="#40A02B" opacity="0.18"/>
  <polygon points="0,800 0,740 800,580 800,800" fill="#40A02B"/>

  <!-- White circle punched in green band -->
  <circle cx="100" cy="756" r="48" fill="#EFF1F5"/>

  <!-- Headline tilted +6° -->
  <g transform="rotate(6, 48, 280)">
    <text x="48" y="170" font-family="'Inter',system-ui,sans-serif" font-size="82" font-weight="900" fill="#4C4F69" letter-spacing="-0.028em">ExitPlan</text>
    <text x="48" y="258" font-family="'Inter',system-ui,sans-serif" font-size="82" font-weight="900" fill="#40A02B" letter-spacing="-0.028em">Mode</text>
    <text x="48" y="346" font-family="'Inter',system-ui,sans-serif" font-size="82" font-weight="900" fill="#4C4F69" letter-spacing="-0.028em">Approval.</text>
  </g>

  <!-- Tilted rule -->
  <line x1="48" y1="420" x2="600" y2="406" stroke="#CCD0DA" stroke-width="1.5"/>

  <!-- Body -->
  <text x="48" y="458" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">Full plan posted to Discord with</text>
  <text x="48" y="482" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">interactive buttons. Give Feedback</text>
  <text x="48" y="506" font-family="'Inter',system-ui,sans-serif" font-size="18" font-weight="400" fill="#4C4F69">opens a Modal for revision notes.</text>

  <!-- Three-button row — just above the green band -->
  <rect x="48" y="540" width="160" height="38" fill="#40A02B"/>
  <text x="128" y="564" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#EFF1F5" letter-spacing="0.06em" text-anchor="middle">APPROVE</text>
  <rect x="224" y="540" width="140" height="38" fill="#D20F39"/>
  <text x="294" y="564" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#EFF1F5" letter-spacing="0.06em" text-anchor="middle">REJECT</text>
  <rect x="380" y="540" width="220" height="38" fill="#4C4F69"/>
  <text x="490" y="564" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#EFF1F5" letter-spacing="0.06em" text-anchor="middle">GIVE FEEDBACK</text>

  <!-- Label in white over green band -->
  <text x="160" y="764" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#EFF1F5" letter-spacing="0.12em">CLAUDE CODE DISCORD BOT HOOK</text>
  <text x="48" y="56" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#6C6F85" letter-spacing="0.15em">05 / 09  ·  WORKFLOW</text>
</svg>
